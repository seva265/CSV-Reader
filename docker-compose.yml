version: '3.9'

services:
  database:
    image: postgres:16-alpine
    container_name: postgres
    environment:
    - POSTGRES_USER=${DB_USER}
    - POSTGRES_PASSWORD=${DB_PASSWORD}
    - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_:/var/lib/postgresql/data
    restart: unless-stopped 

volumes:
  postgres_:
